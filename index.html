<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Quiz Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .quiz-container { max-width: 650px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; text-align: left; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover { background: #eaf2f8; border-color: #3498db; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .btn-primary { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn-primary:hover { background: #219653; }
        #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="login-screen">
        <h2>🛡️ Enter the Kingdom Quiz</h2>
        <div class="input-group">
            <label for="student-name">Your Noble Name:</label>
            <input type="text" id="student-name" placeholder="e.g., Knight David">
        </div>
        <div class="input-group">
            <label for="chapter-select">Choose Chapter Target:</label>
            <select id="chapter-select">
                <option value="1_Kings_1">Chapter 1: 1 Kings 1</option>
                <option value="1_Kings_2">Chapter 2: 1 Kings 2</option>
            </select>
        </div>
        <button class="btn-primary" onclick="startQuiz()">Begin the Trial ⚔️</button>
    </div>

    <div id="quiz-screen">
        <h3 id="question-number" style="color: #7f8c8d; margin: 0;"></h3>
        <h2 id="question-text" style="margin-top: 5px;"></h2>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" style="text-align: center;">
        <h2>🎉 Trial Concluded!</h2>
        <h1 id="final-score-display" style="color: #27ae60; font-size: 48px; margin: 10px 0;">0</h1>
        <p>Your record has been submitted to the scrolls of the kingdom.</p>
        <button class="btn-primary" onclick="redirectToLeaderboard()">View Leaderboard 🏆</button>
    </div>
</div>

<script>
    // 🛡️ Pre-linked straight to your custom South East Asia database URL
    const databaseURL = "https://kingdomquiz-7b4bf-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    let studentName = "";
    let selectedChapter = "";
    let loadedQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let studentAnswersLog = [];

    function startQuiz() {
        studentName = document.getElementById("student-name").value.trim();
        selectedChapter = document.getElementById("chapter-select").value;

        if (!studentName) {
            alert("Please enter your name to begin!");
            return;
        }

        // Fetch the corresponding questions directly from your specified folder branch
        fetch(`${databaseURL}/questions/${selectedChapter}.json`)
            .then(res => res.json())
            .then(questions => {
                if (!questions || questions.length === 0) {
                    alert("No questions found in database for this chapter path yet.");
                    return;
                }
                loadedQuestions = questions;
                currentIdx = 0;
                score = 0;
                studentAnswersLog = [];
                
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("quiz-screen").style.display = "block";
                showQuestion();
            })
            .catch(err => {
                console.error(err);
                alert("Error connecting to database structure.");
            });
    }

    function showQuestion() {
        if (currentIdx >= loadedQuestions.length) {
            submitFinalResults();
            return;
        }

        let q = loadedQuestions[currentIdx];
        document.getElementById("question-number").innerText = `Statement ${currentIdx + 1} of ${loadedQuestions.length}`;
        document.getElementById("question-text").innerText = q.question;

        let optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";

        q.options.forEach((opt, idx) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => handleAnswerSelection(idx, opt, q);
            optionsBox.appendChild(btn);
        });
    }

    function handleAnswerSelection(chosenIndex, chosenText, questionObj) {
        let isCorrect = (chosenIndex === questionObj.correct);
        
        if (isCorrect) {
            score += 10; // Gives 10 points per right answer
        }

        // 🌟 PACKAGES THE DATA BREAKDOWN DYNAMICALLY FOR THE DIAGNOSTICS DASHBOARD
        studentAnswersLog.push({
            question: questionObj.question,
            selectedOption: chosenText,
            isCorrect: isCorrect
        });

        currentIdx++;
        showQuestion();
    }

    function submitFinalResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score-display").innerText = `${score} Pts`;

        const payload = {
            name: studentName,
            score: score,
            chapter: selectedChapter,
            breakdown: studentAnswersLog // 🌟 Transmits full answer traces to Firebase
        };

        // Post cleanly straight into your database scores ledger
        fetch(`${databaseURL}/scores.json`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
    }

    function redirectToLeaderboard() {
        window.location.href = "leaderboard.html";
    }
</script>

</body>
</html>
