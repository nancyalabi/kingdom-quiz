<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .leaderboard-container { max-width: 750px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; text-align: center; }
        .filter-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; }
        select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; background: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: bold; }
        tr:hover { background-color: #fcfcfc; }
        
        .rank { font-weight: bold; color: #7f8c8d; width: 60px; }
        .name { font-weight: 60px; color: #2c3e50; }
        .score { text-align: right; font-weight: bold; color: #27ae60; }
        th.score-header { text-align: right; }
        
        .btn-secondary { background: #34495e; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 25px; }
        .btn-secondary:hover { background: #2c3e50; }
        .no-data { text-align: center; color: #7f8c8d; padding: 30px; font-style: italic; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <h2>🏆 Scrolls of Honor</h2>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">

    <div class="filter-group">
        <label for="leaderboard-filter">Filter by Chapter Target:</label>
        <select id="leaderboard-filter" onchange="renderLeaderboard()">
            <option value="all">Show All Chapters</option>
            <option value="1_Kings_1">Chapter 1: 1 Kings 1</option>
            <option value="1_Kings_2">Chapter 2: 1 Kings 2</option>
        </select>
    </div>

    <table id="leaderboard-table">
        <thead>
            <tr>
                <th class="rank">Rank</th>
                <th>Noble Name</th>
                <th>Chapter</th>
                <th class="score-header">Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            </tbody>
    </table>

    <div id="no-data-msg" class="no-data" style="display: none;">No noble records found for this selection yet.</div>

    <button class="btn-secondary" onclick="backToQuiz()">Return to the Trial ⚔️</button>
</div>

<script>
    const databaseURL = "https://kingdomquiz-7b4bf-default-rtdb.asia-southeast1.firebasedatabase.app";
    let allRecords = [];

    // Fetch data immediately when the page loads
    window.onload = function() {
        fetchLeaderboardData();
    };

    function fetchLeaderboardData() {
        fetch(`${databaseURL}/scores.json`)
            .then(res => res.json())
            .then(data => {
                allRecords = [];
                if (data) {
                    // Firebase returns an object containing unique keys, transform it into an array
                    Object.keys(data).forEach(key => {
                        allRecords.push(data[key]);
                    });
                    
                    // Default Sort: High score to low score
                    allRecords.sort((a, b) => b.score - a.score);
                }
                renderLeaderboard();
            })
            .catch(err => {
                console.error("Error pulling leaderboard data: ", err);
                document.getElementById("leaderboard-body").innerHTML = 
                    `<tr><td colspan="4" style="color: #c0392b; text-align:center;">Failed to recover scroll archives.</td></tr>`;
            });
    }

    function renderLeaderboard() {
        const filterValue = document.getElementById("leaderboard-filter").value;
        const tbody = document.getElementById("leaderboard-body");
        const noDataMsg = document.getElementById("no-data-msg");
        
        tbody.innerHTML = "";
        
        // Filter elements based on selection dropdown
        let filteredRecords = allRecords;
        if (filterValue !== "all") {
            filteredRecords = allRecords.filter(item => item.chapter === filterValue);
        }

        if (filteredRecords.length === 0) {
            noDataMsg.style.display = "block";
            document.getElementById("leaderboard-table").style.display = "none";
            return;
        }

        noDataMsg.style.display = "none";
        document.getElementById("leaderboard-table").style.display = "table";

        filteredRecords.forEach((record, index) => {
            let row = document.createElement("tr");
            
            // Format Chapter name cleanly for display
            let displayChapter = record.chapter ? record.chapter.replace(/_/g, ' ') : 'Unknown';

            row.innerHTML = `
                <td class="rank">#${index + 1}</td>
                <td class="name">${escapeHTML(record.name)}</td>
                <td style="color: #7f8c8d; font-size: 14px;">${displayChapter}</td>
                <td class="score">${record.score} Pts</td>
            `;
            tbody.appendChild(row);
        });
    }

    function backToQuiz() {
        window.location.href = "index.html"; // Adjust to your quiz main filename if different
    }

    // Helper to sanitize database names against script injections
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }
</script>

</body>
</html>
